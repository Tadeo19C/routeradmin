<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MEGACOM</title>

  <!-- Google Font: Outfit -->
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <!-- Font Awesome -->
  <link rel="stylesheet" href="/static/AdminLTE-3.2.0/plugins/fontawesome-free/css/all.min.css">
  <!-- Theme style -->
  <link rel="stylesheet" href="/static/AdminLTE-3.2.0/dist/css/adminlte.min.css">
  <!-- Modern UI -->
  <link rel="stylesheet" href="/static/modern_ui.css">
  <style>
    body {
        background-color: #ffffff !important;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: 'Outfit', sans-serif;
    }
    .register-box, .login-box {
        background: #ffffff;
        border: 1px solid #e2e8f0;
        border-radius: 12px;
        padding: 2.5rem;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
        width: 400px;
    }
    .register-box .card, .login-box .card {
        background: transparent !important;
        box-shadow: none !important;
        border: none !important;
        margin-bottom: 0;
    }
    .register-card-body, .login-card-body {
        background: transparent !important;
        color: #0f172a !important;
        padding: 0 !important;
    }
    .register-logo a, .login-logo a {
        color: #2563eb !important;
        font-weight: 800;
        letter-spacing: -1px;
        font-size: 2rem;
    }
    .form-control {
        background: #f8fafc !important;
        border: 1px solid #e2e8f0 !important;
        border-right: none !important;
        color: #0f172a !important;
        border-top-left-radius: 8px !important;
        border-bottom-left-radius: 8px !important;
        height: 48px !important;
    }
    .form-control::placeholder {
        color: #94a3b8 !important;
    }
    .input-group-text {
        background: #f8fafc !important;
        border: 1px solid #e2e8f0 !important;
        border-left: none !important;
        color: #64748b !important;
        border-top-right-radius: 8px !important;
        border-bottom-right-radius: 8px !important;
    }
    .btn-primary {
        background: #2563eb !important;
        border: none !important;
        color: white !important;
        border-radius: 8px !important;
        height: 48px !important;
        font-weight: 700 !important;
        transition: all 0.3s ease;
        margin-top: 1rem;
    }
    .btn-primary:hover {
        background: #1d4ed8 !important;
        transform: translateY(-1px);
    }
  </style>
</head>
<body class="hold-transition">
{% block content %}
{% endblock %}

<!-- jQuery -->
<script src="/static/AdminLTE-3.2.0/plugins/jquery/jquery.min.js"></script>
<!-- Bootstrap 4 -->
<script src="/static/AdminLTE-3.2.0/plugins/bootstrap/js/bootstrap.bundle.min.js"></script>
<!-- AdminLTE App -->
<script src="/static/AdminLTE-3.2.0/dist/js/adminlte.min.js"></script>

</body>
</html>

{% extends 'base.html' %}

{% block content %}
<div class='row'>
    <div class='col-lg-6'>
        <div class="card card-primary card-outline">
            <div class="card-header">
                <h3 class="card-title">Administrar Nodos</h3>
            </div>
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    <div class="row">
                        <div class="col-md-12">
                            <h4>Equipos Seleccionados:</h4>
                            <ul>
                                {% for router in routers %}
                                    <li>{{ router.name }}</li>
                                    <input type="hidden" name="router_uuids" value="{{ router.uuid }}">
                                {% endfor %}
                            </ul>
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-md-6">
                            <div class="form-group">
                                <label for="add_group">Añadir a Nodo:</label>
                                <select class="form-control" id="add_group" name="add_group">
                                    <option value="">-- Seleccionar Nodo --</option>
                                    {% for group in groups %}
                                        <option value="{{ group.uuid }}">{{ group.name }}</option>
                                    {% endfor %}
                                </select>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="form-group">
                                <label for="remove_group">Eliminar de Nodo:</label>
                                <select class="form-control" id="remove_group" name="remove_group">
                                    <option value="">-- Seleccionar Nodo --</option>
                                    {% for group in groups %}
                                        <option value="{{ group.uuid }}">{{ group.name }}</option>
                                    {% endfor %}
                                </select>
                            </div>
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-md-12 text-right">
                            <button type="submit" class="btn btn-success">Aplicar Cambios</button>
                            <a href="/router/list/" class="btn btn-secondary">Cancelar</a>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block custom_page_scripts %}
<script>
$(document).ready(function() {
    // Prevent selecting the same group for both add and remove
    $('#add_group, #remove_group').on('change', function() {
        var addGroup = $('#add_group').val();
        var removeGroup = $('#remove_group').val();

        if (addGroup && removeGroup && addGroup === removeGroup) {
            alert("No puedes seleccionar el mismo nodo para añadir y eliminar a la vez.");
            $(this).val('');
        }
    });
});
</script>
{% endblock %}

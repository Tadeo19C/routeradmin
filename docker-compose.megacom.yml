services:
  megacom-db:
    container_name: megacom-db
    restart: unless-stopped
    image: postgres:16
    volumes:
      - megacom_postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-megacom}
      - POSTGRES_USER=${POSTGRES_USER:-admin}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-password123}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d megacom"]
      interval: 10s
      timeout: 5s
      retries: 5

  megacom-app:
    container_name: megacom-app
    restart: unless-stopped
    build: .
    environment:
      - SERVER_ADDRESS=${SERVER_ADDRESS:-0.0.0.0}
      - DEBUG_MODE=False
      - DATABASE_ENGINE=django.db.backends.postgresql
      - POSTGRES_HOST=megacom-db
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB:-megacom}
      - POSTGRES_USER=${POSTGRES_USER:-admin}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-password123}
      - TZ=${TIMEZONE:-UTC}
    volumes:
      - megacom_media:/var/lib/routerfleet/
      - megacom_static:/app_static_files/
    command: /bin/bash /app/init.sh
    depends_on:
      megacom-db:
        condition: service_healthy

  megacom-web:
    container_name: megacom-web
    restart: unless-stopped
    image: nginx:alpine
    volumes:
      - megacom_static:/static:ro
      - ./nginx/megacom.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "80:80"
    depends_on:
      - megacom-app

volumes:
  megacom_postgres_data:
  megacom_media:
  megacom_static:

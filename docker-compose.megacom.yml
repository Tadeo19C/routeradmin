version: "3.8"
services:
  megacom-db:
    container_name: megacom-db
    restart: unless-stopped
    image: postgres:16
    volumes:
      - megacom_postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-megacom}
      - POSTGRES_USER=${POSTGRES_USER:-admin}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-password123}

  megacom-redis:
    container_name: megacom-redis
    restart: unless-stopped
    image: redis:7-alpine
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - megacom_redis_data:/data

  megacom-app:
    container_name: megacom-app
    restart: unless-stopped
    build: .
    environment:
      - SERVER_ADDRESS=${SERVER_ADDRESS:-0.0.0.0}
      - DEBUG_MODE=False
      - DATABASE_ENGINE=postgres
      - COMPOSE_VERSION=08a
      - COMPOSE_TYPE=with-postgres
      - POSTGRES_HOST=megacom-db
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB:-megacom}
      - POSTGRES_USER=${POSTGRES_USER:-admin}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-password123}
      - CELERY_BROKER_URL=redis://megacom-redis:6379/0
      - CELERY_RESULT_BACKEND=redis://megacom-redis:6379/0
      - TZ=${TIMEZONE:-UTC}
    volumes:
      - megacom_media:/var/lib/routerfleet/
      - megacom_static:/app_static_files/
      - megacom_secrets:/app_secrets/
    command: /bin/bash /app/init.sh
    depends_on:
      - megacom-db
      - megacom-redis

  megacom-celery-worker:
    container_name: megacom-celery-worker
    restart: unless-stopped
    build: .
    command: celery -A routerfleet worker --loglevel=info --concurrency=${CELERY_CONCURRENCY:-4}
    environment:
      - DATABASE_ENGINE=postgres
      - POSTGRES_HOST=megacom-db
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB:-megacom}
      - POSTGRES_USER=${POSTGRES_USER:-admin}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-password123}
      - CELERY_BROKER_URL=redis://megacom-redis:6379/0
      - CELERY_RESULT_BACKEND=redis://megacom-redis:6379/0
      - TZ=${TIMEZONE:-UTC}
    volumes:
      - megacom_media:/var/lib/routerfleet/
    depends_on:
      - megacom-db
      - megacom-redis
      - megacom-app

  megacom-celery-beat:
    container_name: megacom-celery-beat
    restart: unless-stopped
    build: .
    command: celery -A routerfleet beat --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler 2>/dev/null || celery -A routerfleet beat --loglevel=info
    environment:
      - DATABASE_ENGINE=postgres
      - POSTGRES_HOST=megacom-db
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB:-megacom}
      - POSTGRES_USER=${POSTGRES_USER:-admin}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-password123}
      - CELERY_BROKER_URL=redis://megacom-redis:6379/0
      - CELERY_RESULT_BACKEND=redis://megacom-redis:6379/0
      - TZ=${TIMEZONE:-UTC}
    depends_on:
      - megacom-db
      - megacom-redis
      - megacom-app

  megacom-web:
    container_name: megacom-web
    restart: unless-stopped
    image: nginx:alpine
    volumes:
      - megacom_static:/static:ro
      - ./nginx/megacom.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "80:80"
    depends_on:
      - megacom-app

volumes:
  megacom_postgres_data:
  megacom_media:
  megacom_static:
  megacom_secrets:
  megacom_redis_data:
